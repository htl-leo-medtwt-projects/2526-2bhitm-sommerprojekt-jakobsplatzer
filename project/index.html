<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sommerprojekt</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="start-section">
        <div id="start-text-container">
            <img id="cloud-img" src="img/Cartoon-Cloud.png" alt="Cartoon Cloud">
            <p id="start-text">Wolly's way <br> Home</p>
        </div>

        <div id="start-button1" onclick="startToVid()">
            <p>Play</p>
        </div>
    </div>

     <div id="video-section" >
        <video src="vid/Lamb-Intro.mp4" controls></video>
        <div class="next-btn" onclick="vidToCon()">
            <p>Next</p>
            <img src="img/arrow.svg" alt="arrow">
        </div>
    </div>

    <div id="con-with-chick1" class="con-with-chick">
        <div class="next-btn" onclick="Con1ToCon2()">
            <p>Next</p>
            <img src="img/arrow.svg" alt="arrow">
        </div>
    </div>
    <div id="con-with-chick2" class="con-with-chick">
        <div class="next-btn" onclick="Con2ToCon3()">
            <p>Next</p>
            <img src="img/arrow.svg" alt="arrow">
        </div>
    </div>    
    <div id="con-with-chick3" class="con-with-chick">
        <div class="next-btn" onclick="Con3ToCon4()">
            <p>Next</p>
            <img src="img/arrow.svg" alt="arrow">
        </div>
    </div>    
    <div id="con-with-chick4" class="con-with-chick">
        <div class="next-btn">
            <p>Next</p>
            <img src="img/arrow.svg" alt="arrow">
        </div>
    </div>
</body>
</html>
